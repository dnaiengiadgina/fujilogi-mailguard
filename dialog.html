<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信前確認 - FujilogiMailGuard</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "メイリオ", "Meiryo", sans-serif;
      font-size: 13px;
      background: #f5f7fa;
      color: #222;
    }

    #warning-banner {
      display: none;
      background: #fff3cd;
      border-bottom: 1px solid #ffc107;
      padding: 10px 16px;
      color: #856404;
      font-weight: bold;
      font-size: 13px;
    }
    #warning-banner.visible { display: block; }

    .scroll-area {
      overflow-y: auto;
      padding: 14px 16px 8px;
      height: calc(100vh - 60px);
    }

    .section-label {
      font-size: 11px;
      font-weight: bold;
      color: #005096;
      margin-bottom: 3px;
      margin-top: 10px;
    }
    .section-label:first-child { margin-top: 0; }

    .subject-box {
      background: #fff;
      border: 1px solid #ccc;
      padding: 5px 8px;
      font-weight: bold;
      font-size: 13px;
      border-radius: 3px;
    }

    .recipient-list {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 3px;
      max-height: 80px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .recipient-item {
      padding: 3px 8px;
      font-size: 12px;
      line-height: 1.6;
    }
    .recipient-item.external {
      color: #c00000;
      font-weight: bold;
    }
    .recipient-item.none {
      color: #999;
      font-style: italic;
    }

    .attach-list {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 3px;
      max-height: 70px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .attach-item {
      padding: 3px 8px;
      font-size: 12px;
    }

    .body-preview {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 6px 8px;
      font-size: 12px;
      color: #444;
      height: 80px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .note {
      font-size: 11px;
      color: #666;
      font-style: italic;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .btn-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: #ebedf2;
      border-top: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 16px;
      gap: 10px;
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 4px;
      font-family: "メイリオ", sans-serif;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-cancel {
      background: #ddd;
      color: #333;
      border: 1px solid #bbb;
    }
    .btn-cancel:hover { background: #ccc; }
    .btn-send {
      background: #0072c6;
      color: #fff;
      font-weight: bold;
    }
    .btn-send:hover { background: #005a9e; }
  </style>
</head>
<body>

<div id="warning-banner">⚠ 社外（外部ドメイン）への送信が含まれています。宛先を再確認してください。</div>

<div class="scroll-area">
  <div class="section-label">件名</div>
  <div class="subject-box" id="subject">（読み込み中）</div>

  <div class="section-label" id="to-label">宛先（To）</div>
  <div class="recipient-list" id="to-list"></div>

  <div class="section-label" id="cc-label">CC</div>
  <div class="recipient-list" id="cc-list"></div>

  <div class="section-label" id="bcc-label">BCC</div>
  <div class="recipient-list" id="bcc-list"></div>

  <div id="attach-section">
    <div class="section-label" id="attach-label">添付ファイル</div>
    <div class="attach-list" id="attach-list"></div>
  </div>

  <div class="section-label">本文プレビュー（先頭300文字）</div>
  <div class="body-preview" id="body-preview"></div>

  <div class="note">上記の内容を確認しました。よろしければ「送信する」を押してください。</div>
</div>

<div class="btn-area">
  <button class="btn btn-cancel" onclick="onCancel()">キャンセル（送信しない）</button>
  <button class="btn btn-send" onclick="onSend()">送信する</button>
</div>

<script>
  const INTERNAL_DOMAIN = "fujilogi.co.jp";

  Office.initialize = function () {
    Office.context.ui.addHandlerAsync(
      Office.EventType.DialogParentMessageReceived,
      function (args) {
        const data = JSON.parse(args.message);
        renderDialog(data);
      }
    );
  };

  function renderDialog(data) {
    // 件名
    document.getElementById("subject").textContent = data.subject || "（件名なし）";

    // 外部送信警告
    if (data.hasExternal) {
      document.getElementById("warning-banner").classList.add("visible");
    }

    // 宛先
    renderRecipients("to-list",  "to-label",  data.to,  "宛先（To）",  data.internalDomain);
    renderRecipients("cc-list",  "cc-label",  data.cc,  "CC",          data.internalDomain);
    renderRecipients("bcc-list", "bcc-label", data.bcc, "BCC",         data.internalDomain);

    // 添付ファイル
    if (data.attachments && data.attachments.length > 0) {
      document.getElementById("attach-label").textContent =
        "添付ファイル（" + data.attachments.length + "件）";
      const attachList = document.getElementById("attach-list");
      data.attachments.forEach(function (att) {
        const div = document.createElement("div");
        div.className = "attach-item";
        div.textContent = "📎 " + (att.name || att.fileName || att);
        attachList.appendChild(div);
      });
    } else {
      document.getElementById("attach-section").style.display = "none";
    }

    // 本文プレビュー
    document.getElementById("body-preview").textContent =
      data.body ? data.body + (data.body.length >= 300 ? "\n\n…（以下省略）" : "") : "（本文なし）";
  }

  function renderRecipients(listId, labelId, recipients, caption, internalDomain) {
    const list = document.getElementById(listId);
    const label = document.getElementById(labelId);
    list.innerHTML = "";

    if (!recipients || recipients.length === 0) {
      label.textContent = caption;
      const div = document.createElement("div");
      div.className = "recipient-item none";
      div.textContent = "（なし）";
      list.appendChild(div);
      return;
    }

    label.textContent = caption + "（" + recipients.length + "件）";
    recipients.forEach(function (r) {
      const email = (r.emailAddress || "").toLowerCase();
      const isExternal = email && !email.endsWith("@" + internalDomain.toLowerCase());
      const div = document.createElement("div");
      div.className = "recipient-item" + (isExternal ? " external" : "");
      div.textContent = (isExternal ? "[外部] " : "") +
        (r.displayName ? r.displayName + " <" + r.emailAddress + ">" : r.emailAddress);
      list.appendChild(div);
    });
  }

  function onSend() {
    Office.context.ui.messageParent("send");
  }

  function onCancel() {
    Office.context.ui.messageParent("cancel");
  }
</script>
</body>
</html>
